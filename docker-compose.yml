services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tanush_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tanush
      POSTGRES_USER: tanush
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tanush -d tanush"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tanush_net

  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tanush_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tanush:${POSTGRES_PASSWORD}@db:5432/tanush
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      EMAIL_FROM: ${EMAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      DELHIVERY_API_TOKEN: ${DELHIVERY_API_TOKEN}
      DELHIVERY_BASE_URL: ${DELHIVERY_BASE_URL:-https://one.delhivery.com}
      DELHIVERY_SELLER_NAME: ${DELHIVERY_SELLER_NAME}
      DELHIVERY_RETURN_ADDRESS: ${DELHIVERY_RETURN_ADDRESS}
      DELHIVERY_RETURN_CITY: ${DELHIVERY_RETURN_CITY}
      DELHIVERY_RETURN_PIN: ${DELHIVERY_RETURN_PIN}
      DELHIVERY_RETURN_PHONE: ${DELHIVERY_RETURN_PHONE}
      DELHIVERY_RETURN_STATE: ${DELHIVERY_RETURN_STATE}
      DELHIVERY_WAREHOUSE_NAME: ${DELHIVERY_WAREHOUSE_NAME}
      DELHIVERY_GSTIN: ${DELHIVERY_GSTIN:-}
      TCS_IDENTIFIER: ${TCS_IDENTIFIER:-}
      TCS_SUP_NAME: ${TCS_SUP_NAME:-}
      TCS_GSTIN: ${TCS_GSTIN:-}
      TCS_SUPPLIER_ID: ${TCS_SUPPLIER_ID:-}
      TCS_ENROLLMENT_NO: ${TCS_ENROLLMENT_NO:-}
    networks:
      - tanush_net

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tanush_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certs from Hostinger — place files in ./nginx/certs/ on the VPS
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - tanush_net

volumes:
  postgres_data:
    driver: local

networks:
  tanush_net:
    driver: bridge
